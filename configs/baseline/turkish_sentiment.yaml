# Turkish Sentiment Baseline Experiment Configuration
# Generated from UI on 2026-03-16 17:28:47

experiment:
  name: baseline
  description: turkish_sentiment_baseline
  author: cakir
dataset:
  name: turkish_sentiment
  train_path: data/processed/turkish_sentiment_train.csv
  test_path: data/processed/turkish_sentiment_test.csv
  language: turkish
  task: multiclass_sentiment
  classes:
  - pozitif
  - notr
  - negatif
  sample_size: 50000
preprocessing:
  remove_stopwords: true
  remove_punctuation: true
  remove_numbers: false
  remove_urls: true
  remove_html: true
  lowercase: true
  min_word_length: 2
feature_extraction:
  method: tfidf
  max_features: 10000
  ngram_range:
  - 1
  - 2
  min_df: 2
  max_df: 0.95
  sublinear_tf: true
  sparse: true
models:
  naive_bayes:
    enabled: true
    alpha: 1.0
  svm:
    enabled: true
    C: 1.0
    max_iter: 1000
  random_forest:
    enabled: true
    n_estimators: 100
    max_depth: 50
    n_jobs: 4
  knn:
    enabled: false
  logistic_regression:
    enabled: true
    C: 1.0
    max_iter: 1000
    solver: lbfgs
  xgboost:
    enabled: true
    n_estimators: 100
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    n_jobs: 4
  decision_tree:
    enabled: true
    max_depth: 20
    min_samples_split: 2
    min_samples_leaf: 1
    criterion: gini
  transformer:
    enabled: false
training:
  random_state: 42
output:
  save_models: true
  save_feature_extractor: true
  save_metrics: true
  save_confusion_matrix: true
